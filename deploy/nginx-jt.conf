# nginx server block for Job Pipeline Tracker.
#
# Installed on the VPS at /etc/nginx/sites-available/jt and symlinked into
# sites-enabled. It listens on a non-standard TLS port (2053) because port 443
# on this host is already used by another service. Cloudflare sits in front:
# it terminates the public certificate at the edge and forwards traffic to this
# origin port, so visitors always reach https://jt.dkvasnikov.ru on 443.

server {
    listen 2053 ssl;
    listen [::]:2053 ssl;
    http2 on;

    server_name jt.dkvasnikov.ru;

    # Origin certificate (Cloudflare to origin leg). The public cert seen by
    # browsers is Cloudflare's edge certificate.
    ssl_certificate     /etc/nginx/ssl/jt.crt;
    ssl_certificate_key /etc/nginx/ssl/jt.key;

    root /var/www/jt;
    index index.html;

    # Hashed build assets never change content for a given name: cache hard.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # index.html must never be cached, so a new deploy is picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Single-page app: unknown paths fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    add_header X-Content-Type-Options "nosniff" always;
}
